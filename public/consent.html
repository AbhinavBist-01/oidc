<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize Application</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --ok: #0f766e;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #eef2ff 0%, #f8fafc 55%, #ecfeff 100%);
        min-height: 100dvh;
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .panel {
        width: min(560px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.2rem 1.2rem 1rem;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }

      .meta {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.8rem;
      }

      .meta-row {
        margin: 0.35rem 0;
        font-size: 0.92rem;
      }

      .meta-row span {
        color: var(--muted);
      }

      ul {
        margin: 0.35rem 0 0;
        padding-left: 1rem;
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.7rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        height: 2.4rem;
        padding: 0 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .deny {
        background: #fee2e2;
        color: var(--danger);
      }

      .allow {
        background: #ccfbf1;
        color: var(--ok);
      }

      .msg {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Authorize Application</h1>
      <p>This app is asking for access to your identity.</p>

      <section class="meta">
        <div class="meta-row"><span>Client ID:</span> <code id="clientId"></code></div>
        <div class="meta-row"><span>Redirect URI:</span> <code id="redirectUri"></code></div>
        <div class="meta-row"><span>Requested Scopes:</span></div>
        <ul id="scopeList"></ul>
      </section>

      <div class="actions">
        <button class="deny" id="denyBtn">Deny</button>
        <button class="allow" id="allowBtn">Allow</button>
      </div>

      <div class="msg" id="msg"></div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("client_id") || "";
      const redirectUri = params.get("redirect_uri") || "";
      const scope = params.get("scope") || "";
      const state = params.get("state") || "";
      const nonce = params.get("nonce") || "";

      document.getElementById("clientId").textContent = clientId;
      document.getElementById("redirectUri").textContent = redirectUri;
      const scopeList = document.getElementById("scopeList");
      scope
        .split(" ")
        .filter(Boolean)
        .forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          scopeList.appendChild(li);
        });

      async function decide(action) {
        const msg = document.getElementById("msg");
        msg.textContent = "Processing...";

        try {
          const res = await fetch("/o/authorize/decision", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action,
              client_id: clientId,
              redirect_uri: redirectUri,
              scope,
              state,
              nonce,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.redirect) {
            msg.textContent = data.message || "Failed to process decision.";
            return;
          }
          window.location.href = data.redirect;
        } catch {
          msg.textContent = "Something went wrong. Please retry.";
        }
      }

      document.getElementById("allowBtn").addEventListener("click", () => decide("allow"));
      document.getElementById("denyBtn").addEventListener("click", () => decide("deny"));
    </script>
  </body>
</html>
