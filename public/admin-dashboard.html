<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Client Approvals</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #fff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #eef2ff 0%, #f8fafc 55%, #ecfeff 100%);
        min-height: 100dvh;
        color: var(--text);
        padding: 1rem;
      }
      .wrap { width: min(920px, 100%); margin: 0 auto; }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      h1 { margin: 0; font-size: 1.4rem; }
      .sub { margin: 0.25rem 0 0; color: var(--muted); }
      button {
        border: 0;
        border-radius: 10px;
        height: 2.2rem;
        padding: 0 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }
      .ghost { background: #e2e8f0; color: #0f172a; }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.8rem;
        margin-bottom: 0.7rem;
      }
      .row { margin: 0.25rem 0; color: var(--muted); font-size: 0.9rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: #0f172a; }
      .actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
      .approve { background: #ccfbf1; color: #0f766e; }
      .reject { background: #fee2e2; color: #b91c1c; }
      .msg { margin-top: 0.8rem; color: var(--muted); }
      .creds {
        margin-top: 0.45rem;
        padding: 0.55rem;
        background: #f8fafc;
        border-radius: 8px;
        border: 1px dashed var(--border);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <h1>Admin Approval Queue</h1>
          <p class="sub">Approve or reject pending OAuth client registrations.</p>
        </div>
        <div>
          <button class="ghost" id="refreshBtn">Refresh</button>
          <button class="ghost" id="logoutBtn">Logout</button>
        </div>
      </div>

      <section class="card">
        <div id="list"></div>
        <div class="msg" id="msg"></div>
      </section>
    </div>

    <script>
      const list = document.getElementById("list");
      const msg = document.getElementById("msg");

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function loadPending() {
        msg.textContent = "Loading pending registrations...";
        list.innerHTML = "";
        try {
          const res = await fetch("/admin/registrations");
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            msg.textContent = data.message || "Failed to fetch registrations.";
            return;
          }

          const rows = data.registrations || [];
          if (!rows.length) {
            msg.textContent = "No pending registrations.";
            return;
          }
          msg.textContent = "";

          rows.forEach((r) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div><strong>${escapeHtml(r.clientName)}</strong></div>
              <div class="row">id: <span class="mono">${escapeHtml(r.id)}</span></div>
              <div class="row">redirectUris: <span class="mono">${escapeHtml(JSON.stringify(r.redirectUris || []))}</span></div>
              <div class="row">description: ${escapeHtml(r.description || "-")}</div>
              <div class="actions">
                <button class="approve">Approve</button>
                <button class="reject">Reject</button>
              </div>
              <div class="creds mono" style="display:none;"></div>
            `;

            const approveBtn = div.querySelector(".approve");
            const rejectBtn = div.querySelector(".reject");
            const credsBox = div.querySelector(".creds");

            approveBtn.addEventListener("click", async () => {
              approveBtn.disabled = true;
              rejectBtn.disabled = true;
              const resApprove = await fetch(`/admin/registrations/${r.id}/approve`, {
                method: "POST",
              });
              const payload = await resApprove.json().catch(() => ({}));
              if (!resApprove.ok) {
                msg.textContent = payload.message || "Approval failed.";
                approveBtn.disabled = false;
                rejectBtn.disabled = false;
                return;
              }
              credsBox.style.display = "block";
              credsBox.textContent =
                `clientId: ${payload.clientId}\nclientSecret: ${payload.clientSecret}\n` +
                "Save now: secret is shown only once.";
              msg.textContent = "Registration approved.";
            });

            rejectBtn.addEventListener("click", async () => {
              approveBtn.disabled = true;
              rejectBtn.disabled = true;
              const resReject = await fetch(`/admin/registrations/${r.id}/reject`, {
                method: "POST",
              });
              const payload = await resReject.json().catch(() => ({}));
              if (!resReject.ok) {
                msg.textContent = payload.message || "Rejection failed.";
                approveBtn.disabled = false;
                rejectBtn.disabled = false;
                return;
              }
              div.remove();
              msg.textContent = "Registration rejected.";
            });

            list.appendChild(div);
          });
        } catch {
          msg.textContent = "Something went wrong.";
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", loadPending);
      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await fetch("/o/logout", { method: "POST" });
        window.location.href = "/o/authenticate";
      });

      loadPending();
    </script>
  </body>
</html>
